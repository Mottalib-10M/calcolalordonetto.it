<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Calcolatore Stipendio Netto – Widget</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#fff;color:#1f2937;font-size:14px;line-height:1.5}
.widget{max-width:380px;margin:0 auto;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}
.widget-header{background:linear-gradient(135deg,#1f2937,#111827);padding:16px 20px;color:#fff}
.widget-header h2{font-size:16px;font-weight:700;margin:0}
.widget-header p{font-size:11px;color:#9ca3af;margin-top:2px}
.widget-body{padding:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.field .input-wrap{position:relative;display:flex;align-items:center;border:1px solid #d1d5db;border-radius:8px;overflow:hidden;transition:border-color .15s}
.field .input-wrap:focus-within{border-color:#E63946;box-shadow:0 0 0 2px rgba(230,57,70,.15)}
.field input{width:100%;border:none;outline:none;padding:8px 40px 8px 12px;font-size:15px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.field .suffix{position:absolute;right:12px;font-size:13px;color:#6b7280;pointer-events:none;font-weight:500}
.field select{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;cursor:pointer;outline:none;transition:border-color .15s}
.field select:focus{border-color:#E63946;box-shadow:0 0 0 2px rgba(230,57,70,.15)}
.result{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:16px;text-align:center;margin-top:4px}
.result .label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;font-weight:600}
.result .amount{font-size:28px;font-weight:800;color:#E63946;margin-top:4px;font-variant-numeric:tabular-nums}
.result .sub{font-size:12px;color:#6b7280;margin-top:6px}
.detail{margin-top:12px;font-size:12px;color:#4b5563}
.detail .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6}
.detail .row:last-child{border-bottom:none}
.detail .row .val{font-weight:600;font-variant-numeric:tabular-nums}
.detail .row .neg{color:#dc2626}
.detail .row .pos{color:#16a34a}
.footer{padding:12px 20px;border-top:1px solid #e5e7eb;text-align:center;font-size:11px;color:#9ca3af}
.footer a{color:#E63946;text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header">
    <h2>Calcolo Stipendio Netto</h2>
    <p>Aggiornato 2026 &middot; IRPEF + INPS + addizionali</p>
  </div>
  <div class="widget-body">
    <div class="field">
      <label for="w-ral">RAL (stipendio lordo annuo)</label>
      <div class="input-wrap">
        <input id="w-ral" type="text" inputmode="decimal" value="30.000">
        <span class="suffix">&euro;</span>
      </div>
    </div>
    <div class="field">
      <label for="w-mensilita">Mensilita</label>
      <select id="w-mensilita">
        <option value="12">12 mensilita</option>
        <option value="13" selected>13 mensilita</option>
        <option value="14">14 mensilita</option>
      </select>
    </div>
    <div class="result">
      <div class="label">Stipendio netto mensile</div>
      <div class="amount" id="w-netto">&mdash;</div>
      <div class="sub" id="w-annuo"></div>
    </div>
    <div class="detail" id="w-detail"></div>
  </div>
  <div class="footer">
    Powered by <a href="https://calcolalordonetto.it/" target="_blank" rel="noopener">Calcola Lordo Netto</a>
  </div>
</div>
<script>
(function(){
  // Simplified IRPEF engine for widget (2026 brackets)
  var INPS_RATE = 0.0919;
  var BRACKETS = [{limit:28000,rate:0.23},{limit:50000,rate:0.33},{limit:Infinity,rate:0.43}];
  var ADD_REG = 0.0173; // national average
  var ADD_COM = 0.008;

  function calcIRPEF(taxable) {
    var tax = 0, prev = 0;
    for (var i = 0; i < BRACKETS.length; i++) {
      var b = BRACKETS[i];
      var slice = Math.min(taxable, b.limit) - prev;
      if (slice <= 0) break;
      tax += slice * b.rate;
      prev = b.limit;
    }
    return tax;
  }

  function detrazioniLavDip(reddito) {
    if (reddito <= 0) return 0;
    if (reddito <= 15000) return 1955;
    if (reddito <= 28000) return 1910 + 1190 * ((28000 - reddito) / 13000);
    if (reddito <= 50000) return 1910 * ((50000 - reddito) / 22000);
    return 0;
  }

  function cuneoFiscale(reddito, imponibile) {
    if (reddito <= 20000) {
      var pct = reddito <= 8500 ? 0.071 : reddito <= 15000 ? 0.053 : 0.048;
      return { esente: imponibile * pct, detrazione: 0 };
    }
    if (reddito <= 32000) return { esente: 0, detrazione: 1000 };
    if (reddito <= 40000) return { esente: 0, detrazione: 1000 * (40000 - reddito) / 8000 };
    return { esente: 0, detrazione: 0 };
  }

  function trattamentoIntegrativo(reddito, irpefNetta) {
    if (reddito <= 15000 && irpefNetta > 0) return 1200;
    return 0;
  }

  function calc(ral, mensilita) {
    var inps = ral * INPS_RATE;
    var imponibile = ral - inps;
    var cuneo = cuneoFiscale(ral, imponibile);
    var imponibileNetto = imponibile - cuneo.esente;
    var irpefLorda = calcIRPEF(imponibileNetto);
    var detrazioni = detrazioniLavDip(imponibileNetto) + cuneo.detrazione;
    var irpefNetta = Math.max(0, irpefLorda - detrazioni);
    var addReg = imponibile * ADD_REG;
    var addCom = imponibile * ADD_COM;
    var ti = trattamentoIntegrativo(ral, irpefNetta);
    var nettoAnnuo = ral - inps - irpefNetta - addReg - addCom + ti;
    return {
      inps: inps,
      irpefLorda: irpefLorda,
      irpefNetta: irpefNetta,
      addReg: addReg,
      addCom: addCom,
      ti: ti,
      nettoAnnuo: nettoAnnuo,
      nettoMensile: nettoAnnuo / mensilita
    };
  }

  function fmt(n) { return n.toLocaleString('it-IT', {minimumFractionDigits:2, maximumFractionDigits:2}); }

  function parseNum(s) {
    return parseFloat(s.replace(/\./g,'').replace(',','.')) || 0;
  }

  function formatInput(n) {
    return Math.round(n).toLocaleString('it-IT');
  }

  var ralInput = document.getElementById('w-ral');
  var menInput = document.getElementById('w-mensilita');
  var nettoEl = document.getElementById('w-netto');
  var annuoEl = document.getElementById('w-annuo');
  var detailEl = document.getElementById('w-detail');

  function update() {
    var ral = parseNum(ralInput.value);
    var men = parseInt(menInput.value) || 13;
    if (ral <= 0) { nettoEl.textContent = '—'; annuoEl.textContent = ''; detailEl.innerHTML = ''; return; }
    var r = calc(ral, men);
    nettoEl.textContent = fmt(r.nettoMensile) + ' \u20AC';
    annuoEl.textContent = 'Netto annuo: ' + fmt(r.nettoAnnuo) + ' \u20AC';
    detailEl.innerHTML =
      '<div class="row"><span>INPS (9,19%)</span><span class="val neg">-' + fmt(r.inps) + ' \u20AC</span></div>' +
      '<div class="row"><span>IRPEF netta</span><span class="val neg">-' + fmt(r.irpefNetta) + ' \u20AC</span></div>' +
      '<div class="row"><span>Add. regionale</span><span class="val neg">-' + fmt(r.addReg) + ' \u20AC</span></div>' +
      '<div class="row"><span>Add. comunale</span><span class="val neg">-' + fmt(r.addCom) + ' \u20AC</span></div>' +
      (r.ti > 0 ? '<div class="row"><span>Tratt. integrativo</span><span class="val pos">+' + fmt(r.ti) + ' \u20AC</span></div>' : '');
  }

  ralInput.addEventListener('input', update);
  menInput.addEventListener('change', update);

  ralInput.addEventListener('focus', function() {
    var n = parseNum(this.value);
    this.value = n > 0 ? String(n) : '';
    this.select();
  });
  ralInput.addEventListener('blur', function() {
    var n = parseNum(this.value);
    this.value = n > 0 ? formatInput(n) : '30.000';
    update();
  });

  update();
})();
</script>
</body>
</html>
